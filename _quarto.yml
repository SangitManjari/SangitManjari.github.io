  page-navigation: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: light
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - text: Rāgas
        menu:
          - href: rag-adana.qmd
            text: Rāg Āḍānā
          - href: rag-bahar.qmd
            text: Rāg Bahār
          - href: rag-behag.qmd
            text: Rāg Behāg
          - href: rag-darabari_kanada.qmd
            text: Rāg Darabāri kānaḍā
